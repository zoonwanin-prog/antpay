name: Go2Pay 15 Minute Cron

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Sync settlements
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://go2pay.vercel.app/api/cron/settlements"

      - name: Sync SafeWallet
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://go2pay.vercel.app/api/cron/safewallet"
