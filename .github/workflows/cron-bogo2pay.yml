name: Go2Pay BoGo2pay Cron

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Sync BoGo2pay daily report
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://go2pay.vercel.app/api/cron/bogo2pay"
