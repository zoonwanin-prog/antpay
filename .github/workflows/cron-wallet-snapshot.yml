name: Go2Pay Wallet Snapshot Cron

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Sync wallet snapshot
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://go2pay.vercel.app/api/cron/wallet-snapshot"
