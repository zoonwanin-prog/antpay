name: Go2Pay Wallet Snapshot Cron

on:
  schedule:
    # GitHub Actions schedules run in UTC. 16:50 UTC = 23:50 Asia/Bangkok.
    - cron: "50 16 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Sync wallet snapshot
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://go2pay.vercel.app/api/cron/wallet-snapshot"
